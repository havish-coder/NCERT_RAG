services:
  neo4j:
    image: neo4j:5.26-community
    container_name: ncert_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_memory_heap_initial__size: 1G
      NEO4J_dbms_memory_heap_max__size: 4G
      NEO4J_dbms_memory_pagecache_size: 2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.14.1
    container_name: ncert_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 10

# Ollama runs directly on the host (not Docker) to access the GPU without extra setup.
# Install: https://ollama.com/download
# Pull models: ollama pull gemma4   (or: ollama pull qwen3.5)
# Ollama listens on localhost:11434 by default (OpenAI-compatible at /v1).

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
